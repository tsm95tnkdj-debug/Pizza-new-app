<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#e85d3f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Pizza Lab">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Pizza Lab</title>
<style>
:root{--bg1:#fff4df;--bg2:#ffe2d1;--card:#fffdf8;--text:#20120d;--muted:#765b50;--line:#f0ddd2;--red:#e85d3f;--dark:#2b1812;--yellow:#ffd166;--soft:#fff3e8}
*{box-sizing:border-box}
body{margin:0;padding:env(safe-area-inset-top) 16px 24px 16px;background:linear-gradient(160deg,var(--bg1),var(--bg2));color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Arial,sans-serif}
.app{max-width:720px;margin:18px auto;background:var(--card);border-radius:30px;padding:22px;box-shadow:0 12px 35px rgba(111,61,35,.18);border:2px solid rgba(232,93,63,.12)}
.hero{display:flex;gap:14px;align-items:center;margin-bottom:16px}.emoji{width:64px;height:64px;border-radius:20px;background:var(--yellow);display:flex;align-items:center;justify-content:center;font-size:38px;box-shadow:0 6px 16px rgba(232,93,63,.22)}
h1{margin:0;font-size:29px;line-height:1}.subtitle{margin:6px 0 0;color:var(--muted);font-size:15px;line-height:1.35}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{margin-bottom:14px}
label{display:block;font-size:14px;color:var(--muted);font-weight:800;margin-bottom:6px}
input,select{width:100%;border:2px solid #f0d3c4;border-radius:18px;padding:13px;font-size:20px;background:white;color:var(--text);-webkit-appearance:none;appearance:none}
input:focus,select:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 4px rgba(232,93,63,.12)}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:var(--soft);padding:7px;border-radius:20px;margin-bottom:16px}
.tab{border:0;border-radius:15px;padding:13px;font-size:15px;font-weight:900;background:transparent;color:var(--text)}
.tab.active{background:var(--red);color:white;box-shadow:0 5px 12px rgba(232,93,63,.28)}
.card{background:linear-gradient(135deg,#fff7e6,#ffe8db);padding:15px;border-radius:20px;margin:10px 0 16px;color:#51382e;font-size:15px;line-height:1.45;border:1px solid #f4d4c5}
.flour-card{display:flex;gap:12px;align-items:flex-start;background:linear-gradient(135deg,#ffffff,#fff0de);border:2px dashed #e85d3f;border-radius:22px;padding:15px;margin-bottom:16px}
.flour-icon{font-size:34px}.flour-title{font-weight:950;font-size:17px;margin-bottom:4px}.flour-text{color:#5d4036;font-size:15px;line-height:1.35}
.results{border-top:2px solid var(--line);margin-top:10px}.row{display:flex;justify-content:space-between;align-items:baseline;gap:14px;padding:14px 0;border-bottom:1px solid var(--line);font-size:17px}
.value{font-size:21px;font-weight:950;white-space:nowrap;color:#32150d}.small{display:block;color:var(--muted);font-size:13px;margin-top:3px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
button.action{border:0;border-radius:18px;padding:14px;font-size:16px;font-weight:950;background:var(--red);color:white;box-shadow:0 6px 14px rgba(232,93,63,.28)}
button.secondary{background:#fff0de;color:var(--dark);box-shadow:none}.settings{margin-top:18px}summary{font-weight:950;cursor:pointer;padding:12px 0;color:#4d2a1d}
.badge{display:inline-block;background:#2f9b65;color:white;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:900;margin-left:6px}
@media(max-width:430px){.grid,.actions{grid-template-columns:1fr}.row{font-size:16px}.value{font-size:19px}.hero{align-items:flex-start}.emoji{width:56px;height:56px;font-size:34px}}
</style>
</head>
<body>
<main class="app">
<div class="hero"><div class="emoji">🍕</div><div><h1>Pizza Lab</h1><p class="subtitle">Ton calculateur de pâte, version plus fun et plus pratique.</p></div></div>
<div class="field"><label for="typePate">Type de pâte</label><select id="typePate"><option value="taglia">🍕 Taglia</option><option value="tonda">🔥 Tonda</option><option value="napolitaine">🇮🇹 Napolitaine</option><option value="focaccia">🌿 Focaccia</option></select></div>
<div class="flour-card"><div class="flour-icon">🌾</div><div><div class="flour-title">Farine recommandée <span class="badge">Conseil</span></div><div class="flour-text" id="farineReco"></div></div></div>
<div class="tabs"><button id="tabFarine" class="tab active" type="button">Depuis farine</button><button id="tabPatons" class="tab" type="button">Depuis pâtons</button></div>
<section id="modeFarine"><div class="field"><label for="farine">Farine en grammes</label><input id="farine" type="text" inputmode="decimal" value="1000"></div></section>
<section id="modePatons" style="display:none"><div class="grid"><div class="field"><label for="nbPatons">Nombre de pâtons</label><input id="nbPatons" type="text" inputmode="numeric" value="4"></div><div class="field"><label for="poidsPaton">Poids par pâton</label><input id="poidsPaton" type="text" inputmode="decimal" value="280"></div></div></section>
<div class="grid"><div class="field"><label for="typeLevure">Type de levure</label><select id="typeLevure"><option value="seche">Levure sèche</option><option value="fraiche">Levure fraîche</option></select></div><div class="field"><label for="split">Division eau</label><select id="split"><option value="70">70 % / 30 %</option><option value="80">80 % / 20 %</option><option value="100">100 % / 0 %</option></select></div></div>
<div class="card" id="description"></div>
<details class="settings"><summary>⚙️ Modifier les pourcentages</summary><div class="grid"><div class="field"><label for="pctLevure">Levure %</label><input id="pctLevure" type="text" inputmode="decimal"></div><div class="field"><label for="pctEau">Eau %</label><input id="pctEau" type="text" inputmode="decimal"></div><div class="field"><label for="pctSel">Sel %</label><input id="pctSel" type="text" inputmode="decimal"></div><div class="field"><label for="pctHuile">Huile %</label><input id="pctHuile" type="text" inputmode="decimal"></div></div></details>
<section class="results" aria-live="polite">
<div class="row"><span>🌾 Farine</span><span class="value" id="rFarine">0 g</span></div>
<div class="row"><span>🧫 Levure<span class="small" id="lLevure"></span></span><span class="value" id="rLevure">0 g</span></div>
<div class="row"><span>💧 Eau totale<span class="small" id="lEau"></span></span><span class="value" id="rEau">0 g</span></div>
<div class="row"><span>💧 Première eau</span><span class="value" id="rEauA">0 g</span></div>
<div class="row"><span>💧 Deuxième eau</span><span class="value" id="rEauB">0 g</span></div>
<div class="row"><span>🧂 Sel<span class="small" id="lSel"></span></span><span class="value" id="rSel">0 g</span></div>
<div class="row"><span>🫒 Huile<span class="small" id="lHuile"></span></span><span class="value" id="rHuile">0 g</span></div>
<div class="row"><span>⚖️ Poids total pâte</span><span class="value" id="rTotal">0 g</span></div>
<div class="row"><span>🍕 Poids par pâton estimé</span><span class="value" id="rPaton">0 g</span></div>
</section>
<div class="actions"><button class="action" type="button" id="copier">Copier recette</button><button class="action secondary" type="button" id="reset">Réinitialiser</button></div>
</main>
<script>
const recettes={taglia:{nom:"Taglia",levure:0.2,eau:80,sel:2,huile:2,farine:"Farine T0 — W320 — Caputo rouge. Idéale pour une pâte très hydratée, type taglia/teglia.",desc:"Taglia : eau 80 %, levure 0,2 %, sel 2 %, huile 2 %. Parfaite pour une pâte légère, alvéolée et croustillante."},tonda:{nom:"Tonda",levure:0.2,eau:60,sel:2.75,huile:2.5,farine:"Farine T0 — W280 — Caputo bleu ciel. Plus adaptée à une pâte tonda souple et facile à étaler.",desc:"Tonda : eau 60 %, levure 0,2 %, sel 2,75 %, huile 2,5 %. Une base plus classique, facile à travailler."},napolitaine:{nom:"Napolitaine",levure:0.2,eau:65,sel:2.8,huile:0,farine:"Farine forte à moyenne, idéalement W260-W300 selon le temps de fermentation.",desc:"Napolitaine : base sans huile, hydratation 65 %, sel 2,8 %."},focaccia:{nom:"Focaccia",levure:0.3,eau:85,sel:2.2,huile:4,farine:"Farine forte recommandée, autour de W300-W330 pour bien supporter l’hydratation.",desc:"Focaccia : hydratation élevée 85 %, huile 4 %, texture moelleuse et gourmande."}};
let mode="farine";const $=id=>document.getElementById(id);
function parseFR(v){v=String(v||"").replace(",",".").replace(/[^0-9.]/g,"");const n=parseFloat(v);return Number.isFinite(n)&&n>=0?n:0}
function fmt(n){n=Math.round(n*10)/10;return n.toLocaleString("fr-FR",{maximumFractionDigits:1})+" g"}
function pct(n){return n.toLocaleString("fr-FR",{maximumFractionDigits:2})+" % de la farine"}
function set(id,v){$(id).textContent=fmt(v)}
function chargerRecette(){const r=recettes[$("typePate").value];$("pctLevure").value=String(r.levure).replace(".",",");$("pctEau").value=String(r.eau).replace(".",",");$("pctSel").value=String(r.sel).replace(".",",");$("pctHuile").value=String(r.huile).replace(".",",");$("description").textContent=r.desc;$("farineReco").textContent=r.farine;calculer()}
function calculer(){const levPct=parseFR($("pctLevure").value),eauPct=parseFR($("pctEau").value),selPct=parseFR($("pctSel").value),huilePct=parseFR($("pctHuile").value),split=parseFR($("split").value)/100;let farine=parseFR($("farine").value);if(mode==="patons"){const totalVise=parseFR($("nbPatons").value)*parseFR($("poidsPaton").value);const levRatio=levPct/100,eauRatio=eauPct/100,selRatio=selPct/100,huileRatio=huilePct/100;const levRatioReel=$("typeLevure").value==="fraiche"?levRatio*3:levRatio;const ratioTotal=1+levRatioReel+eauRatio+selRatio+huileRatio;farine=ratioTotal>0?totalVise/ratioTotal:0}let levure=farine*(levPct/100);if($("typeLevure").value==="fraiche")levure*=3;const eau=farine*(eauPct/100),sel=farine*(selPct/100),huile=farine*(huilePct/100),eauA=eau*split,eauB=eau-eauA,total=farine+levure+eau+sel+huile;let paton=0;const nb=parseFR($("nbPatons").value);if(nb>0)paton=total/nb;set("rFarine",farine);set("rLevure",levure);set("rEau",eau);set("rEauA",eauA);set("rEauB",eauB);set("rSel",sel);set("rHuile",huile);set("rTotal",total);set("rPaton",paton);$("lLevure").textContent=pct(levPct)+($("typeLevure").value==="fraiche"?" × 3":"");$("lEau").textContent=pct(eauPct);$("lSel").textContent=pct(selPct);$("lHuile").textContent=pct(huilePct)}
function setMode(m){mode=m;$("modeFarine").style.display=m==="farine"?"block":"none";$("modePatons").style.display=m==="patons"?"block":"none";$("tabFarine").classList.toggle("active",m==="farine");$("tabPatons").classList.toggle("active",m==="patons");calculer()}
function copier(){const texte=["Recette : "+recettes[$("typePate").value].nom,"Farine recommandée : "+$("farineReco").textContent,"Farine : "+$("rFarine").textContent,"Levure : "+$("rLevure").textContent,"Eau totale : "+$("rEau").textContent,"Première eau : "+$("rEauA").textContent,"Deuxième eau : "+$("rEauB").textContent,"Sel : "+$("rSel").textContent,"Huile : "+$("rHuile").textContent,"Poids total : "+$("rTotal").textContent,"Poids par pâton : "+$("rPaton").textContent].join("\\n");if(navigator.clipboard)navigator.clipboard.writeText(texte).then(()=>alert("Recette copiée 🍕"));else alert(texte)}
function reset(){$("typePate").value="taglia";$("farine").value="1000";$("nbPatons").value="4";$("poidsPaton").value="280";$("typeLevure").value="seche";$("split").value="70";setMode("farine");chargerRecette()}
["farine","nbPatons","poidsPaton","typeLevure","split","pctLevure","pctEau","pctSel","pctHuile"].forEach(id=>{$(id).addEventListener("input",calculer);$(id).addEventListener("change",calculer)});
$("typePate").addEventListener("change",chargerRecette);$("tabFarine").addEventListener("click",()=>setMode("farine"));$("tabPatons").addEventListener("click",()=>setMode("patons"));$("copier").addEventListener("click",copier);$("reset").addEventListener("click",reset);chargerRecette();
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./service-worker.js").catch(()=>{}))}
</script>
</body>
</html>
